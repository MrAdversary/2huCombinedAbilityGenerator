<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Touhou: Ability Combination Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    
    <div class="header">
      <h2>Touhou: Ability Combination Generator</h2>
    </div>
    
    <div class="main-content">
      
      <div class="text-area">
        <span class="ability">
          This generator allows you to combine two existing Touhou character's powers into one ability.
        </span>
      </div>
      
      <div class="button-area">
        <div class="btn">
          <button id="Abtn">Combine Ability</button>
        </div>
      </div>
      
    </div>
    
  </div>
  
  <script src="custom.js"></script>
</body>
</html>
